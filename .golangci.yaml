run:
  go: "1.23"
  timeout: 3m

linters:
  enable:
    - dogsled
    - dupl
    - gosec
    - misspell
    - nakedret
    - staticcheck
    - unconvert
    - unparam
    - whitespace

linters-settings:
  staticcheck:
    checks:
      - "all"
      - "-QF1008"

issues:
  exclude-dirs:
    - third_party
    - examples
  exclude-generated: lax
