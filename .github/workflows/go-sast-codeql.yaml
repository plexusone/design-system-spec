name: Go SAST (CodeQL)
permissions:
  actions: read
  contents: read
  security-events: write
on:
  push:
    branches:
      - main
    paths:
      - '**.go'
      - '**/go.mod'
      - '**/go.sum'
      - '.github/workflows/go-sast-codeql.yaml'
  pull_request:
    branches:
      - main
    paths:
      - '**.go'
      - '**/go.mod'
      - '**/go.sum'
      - '.github/workflows/go-sast-codeql.yaml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.23.x'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: go

    - name: Build
      run: |
        cd sdk/go && go build ./...
        cd ../.. && go build ./...

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:go"
